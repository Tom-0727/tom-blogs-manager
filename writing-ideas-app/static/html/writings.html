<div id="writingsRoot">
  <div id="writingsListView">
    <div class="writings-header">
      <div>
        <p class="kicker">Writings</p>
        <h1 style="font-size:1.8rem;">写作</h1>
      </div>
      <button class="btn btn-primary" data-action="new">+ 新增 idea</button>
    </div>

    <div class="stage-subtabs" id="stageSubtabs"></div>
    <div id="writingsGrid" class="writings-grid"></div>
  </div>

  <div id="writingsDetailView">
    <div class="editor-toolbar-custom">
      <button class="btn btn-secondary" data-action="back">&larr; 返回列表</button>
      <div class="btn-group">
        <button class="btn btn-secondary" data-action="publish" id="publishBtn" style="display:none">发布到博客</button>
        <button class="btn btn-danger" data-action="delete">删除</button>
      </div>
    </div>
    <header style="margin-bottom:8px;">
      <h2 id="detailTitle" style="font-size:1.4rem;line-height:1.3;"></h2>
      <div class="meta" id="detailMeta" style="margin-top:6px;"></div>
    </header>

    <div class="detail-grid">
      <section class="detail-stage-content">
        <div class="stage-tabs" id="stageTabs"></div>
        <div id="stageContent" class="stage-md"></div>
      </section>
      <aside class="feedback-panel">
        <h2>沟通</h2>
        <div class="approve-row" id="approveRow"></div>
        <div class="feedback-input-wrap">
          <textarea id="feedbackInput" placeholder="给当前阶段留反馈（多行可换行，纯文本）"></textarea>
          <div class="row">
            <button class="btn btn-primary" data-action="feedback">留反馈</button>
          </div>
        </div>
        <div id="feedbackList" class="feedback-list"></div>
      </aside>
    </div>
  </div>

  <!-- New writing modal -->
  <div class="modal-backdrop" id="newWritingModal">
    <div class="modal">
      <h2>新增写作 idea</h2>
      <label for="newTitle">标题</label>
      <input type="text" id="newTitle" placeholder="例如：Agent 的 Continual Learning 工程化路径" />
      <label for="newIdea">想法 / 角度（可多行）</label>
      <textarea id="newIdea" placeholder="想从什么视角切入？你的经历？想表达什么？"></textarea>
      <label for="newRef">参考链接（可选）</label>
      <input type="url" id="newRef" placeholder="https://..." />
      <div class="row">
        <button class="btn btn-secondary" data-action="cancel">取消</button>
        <button class="btn btn-primary" data-action="confirm">创建</button>
      </div>
    </div>
  </div>
</div>
